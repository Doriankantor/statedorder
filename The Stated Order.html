<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Stated Order — Kantor Consulting</title>
<!--
  ============================================================================
  THE STATED ORDER — interactive strategy map (Kantor Consulting)
  Standalone single-view build (dashboard). Self-contained apart from the
  Google-Fonts, D3, topojson and world-atlas CDNs referenced below.

  HOW TO LINK REAL ARTICLES
  All content lives in the DATA object in the <script> at the bottom of this
  file. Four keys drive everything:

    COUNTRIES  keyed by the country name EXACTLY as it appears in the
               world-atlas TopoJSON (e.g. "United States of America",
               "Dominican Rep."). Shape:
                 'Colombia': {
                   tier: 'core' | 'focus' | 'emerging',   // map colour
                   count: 14,                              // panel figure
                   topics: ['Security & VNSA', ...],       // chips
                   blurb: '…',                             // paragraph
                   publications: [                          // <-- LINK ARTICLES HERE
                     { title:'…', url:'https://…', date:'Jul 8, 2026' },
                   ],
                 }
               Add a `publications` array to any country and the panel lists
               them as links; omit it and the panel shows the generic
               portfolio.kantor-consulting.com link.

    REGIONS    the basket + global-region buttons; each lists the country
               names it highlights (latam / andean / camcarib / southcone /
               northam / europe / asiapac / mea). Accepts `publications` too.

    ACTORS     external-actor lenses (US, EU, China, Iran, Russia): a source
               coord, a `targets` list of country names, and a blurb. Selecting
               one draws arcs source -> targets.

    COORD      [lon, lat] anchors used only to draw the actor arcs.

  HOW THE MAP IS DRAWN
    world-atlas countries-110m TopoJSON, rendered once with D3 NaturalEarth
    (rotated to centre the Americas, zoomed to crop Antarctica/Australia).
    fillFor() colours each country; clicking / basket / lens buttons all call
    render() which repaints the panel and recolours the map.

  TO EMBED IN SQUARESPACE: add a Code block and paste this file, or host it and
  reference it in an <iframe>.
  ============================================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<!-- Optional: generated by scrape-portfolio.mjs. If present, its publications override the built-in ones. Safe to omit. -->
<script src="publications.generated.js" onerror="window.__noPubs=true"></script>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: #0b0f14; font-family: 'IBM Plex Sans', sans-serif; padding: 0; }
  a { color: inherit; }
  #so-card { width: 100%; max-width: 100%; height: 100vh; margin: 0; background: #0b0f14; border: none; border-radius: 0; overflow: hidden; box-shadow: none; color: #e8edf2; display: flex; flex-direction: column; }
  .so-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; border-bottom: 1px solid #1e2a36; background: #0c1219; flex: none; }
  .so-body { display: flex; flex: 1; min-height: 0; }
  .so-mapwrap { flex: 1; position: relative; background: #0c141d; min-width: 0; }
  #so-map { width: 100%; height: 100%; }
  .so-lens { position: absolute; left: 16px; bottom: 14px; right: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .so-lensbtn { cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .06em; padding: 5px 11px; border-radius: 5px; border: 1px solid #33435f; background: #141d29; color: #c7d2de; transition: background .15s, border-color .15s; }
  .so-lensbtn:hover { background: #1b2733; }
  .so-lensbtn.active { background: #37b6ac; border-color: #37b6ac; color: #06121a; font-weight: 600; }
  .so-panel { width: 344px; flex: none; background: #0f151c; border-left: 1px solid #1e2a36; padding: 24px; height: auto; overflow: auto; }
  .so-foot { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; padding: 13px 22px; border-top: 1px solid #1e2a36; background: #0c1219; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: .06em; color: #8a97a5; flex: none; }
  /* Narrow screens: stack the panel under the map so nothing is cut off. */
  @media (max-width: 720px) {
    .so-body { flex-direction: column; }
    .so-mapwrap { min-height: 55vh; }
    .so-panel { width: 100%; border-left: none; border-top: 1px solid #1e2a36; }
  }
  .so-foot span.k { display: inline-flex; align-items: center; gap: 6px; }
  .so-sw { width: 11px; height: 11px; border-radius: 2px; display: inline-block; }
  .so-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; }
  .so-h2 { font-family: 'IBM Plex Serif', serif; font-weight: 500; font-size: 24px; line-height: 1.2; margin: 9px 0 10px; }
  .so-p { font-size: 13.5px; line-height: 1.6; color: #a9b4c0; margin: 0 0 16px; }
  .so-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .14em; color: #8a97a5; text-transform: uppercase; margin-bottom: 8px; }
  .so-basket { cursor: pointer; text-align: left; width: 100%; font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; padding: 10px 13px; border-radius: 7px; border: 1px solid #2a3846; background: transparent; color: #c7d2de; margin-bottom: 7px; transition: background .15s; }
  .so-basket:hover { background: #141d29; }
  .so-basket.lead { font-weight: 500; color: #e8edf2; background: #141d29; }
  .so-chip { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #c7d2de; background: #16202b; border: 1px solid #263442; padding: 4px 9px; border-radius: 5px; margin: 0 6px 6px 0; }
  .so-back { cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #8a97a5; background: none; border: none; padding: 0 0 14px; }
  .so-pub { display: block; text-decoration: none; color: #e8edf2; border-top: 1px solid #1e2a36; padding: 10px 0; }
  .so-pub:hover .so-pub-t { color: #37b6ac; }
  .so-pub-t { display: block; font-family: 'IBM Plex Serif', serif; font-size: 14px; line-height: 1.35; transition: color .15s; }
  .so-pub-d { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #8a97a5; margin-top: 4px; }
  .so-link { display: inline-flex; align-items: center; gap: 8px; font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; font-size: 13px; color: #37b6ac; text-decoration: none; border-bottom: 1px solid #37b6ac; padding-bottom: 2px; }
  .so-note { font-family: 'IBM Plex Mono', monospace; font-size: 10px; line-height: 1.5; color: #6b7783; margin: 16px 0 0; }
</style>
</head>
<body>
  <div id="so-card">
    <div class="so-head">
      <div style="display:flex;align-items:baseline;gap:14px;">
        <span style="font-family:'IBM Plex Sans',sans-serif;font-weight:700;letter-spacing:.16em;font-size:14px;">KANTOR CONSULTING</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8a97a5;letter-spacing:.12em;">/ THE STATED ORDER</span>
      </div>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8a97a5;letter-spacing:.1em;">NSS · WESTERN HEMISPHERE</span>
    </div>
    <div class="so-body">
      <div class="so-mapwrap">
        <div id="so-map"></div>
        <div class="so-lens">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;color:#8a97a5;text-transform:uppercase;">External actors</span>
          <div style="display:flex;gap:6px;flex-wrap:wrap;" id="so-lensrow">
            <button class="so-lensbtn" data-actor="US">United States</button>
            <button class="so-lensbtn" data-actor="EU">Europe</button>
            <button class="so-lensbtn" data-actor="China">China</button>
            <button class="so-lensbtn" data-actor="Iran">Iran</button>
            <button class="so-lensbtn" data-actor="Russia">Russia</button>
          </div>
        </div>
      </div>
      <div class="so-panel" id="so-panel"></div>
    </div>
    <div class="so-foot">
      <span class="k"><span class="so-sw" style="background:#37b6ac;"></span>Core coverage</span>
      <span class="k"><span class="so-sw" style="background:#2b8f8a;"></span>Focus</span>
      <span class="k"><span class="so-sw" style="background:#237572;"></span>Emerging</span>
      <span class="k"><span class="so-sw" style="background:#6486cd;"></span>US &amp; partners</span>
      <span class="k"><span class="so-sw" style="background:#7c554e;"></span>Strategic competitors</span>
    </div>
  </div>

<script>
(function () {
  var PORTFOLIO = 'https://portfolio.kantor-consulting.com';

  var AMERICAS = ['Canada','United States of America','Mexico','Guatemala','Belize','Honduras','El Salvador','Nicaragua','Costa Rica','Panama','Cuba','Haiti','Dominican Rep.','Jamaica','Colombia','Venezuela','Guyana','Suriname','Ecuador','Peru','Brazil','Bolivia','Paraguay','Chile','Argentina','Uruguay','Trinidad and Tobago','Puerto Rico'];
  var LATAM = AMERICAS.filter(function (n) { return n !== 'Canada' && n !== 'United States of America'; });
  var EU_MEMBERS = ['France','Germany','Spain','Portugal','Italy','Netherlands','Belgium','Poland','Sweden','Finland','Austria','Ireland','Denmark','Czechia','Hungary','Romania','Greece','Bulgaria','Slovakia','Croatia','Lithuania','Latvia','Estonia','Slovenia','Luxembourg'];
  // Non-EU European nations we also cover (Ukraine, UK, etc.) — clickable, grouped under the Europe lens.
  var EUROPE_OTHER = ['Ukraine','United Kingdom','Norway','Switzerland','Serbia','Moldova','Belarus','Bosnia and Herz.','Albania','North Macedonia','Montenegro','Kosovo','Iceland'];
  var COMPETITORS = ['China','Russia','Iran'];

  // Each publication may declare `mentions: ['US','China',...]`. The map derives the
  // actor connection lines from these tags, so adding a tagged publication automatically
  // draws a new line (see actorTargets() below).
  var COUNTRIES = {
    'Colombia':  { tier:'core', count:14, topics:['Security & VNSA','Elections 2026','Energy policy','Colombia–Venezuela border'], blurb:'Our single largest coverage area — armed groups after Paz Total, the 2026 elections, energy transition, and the Venezuelan frontier.', publications:[
      { title:'De la Espriella and Colombia\u2019s Energy Future', url:'https://www.kantor-consulting.com/briefingroom/de-la-espriella-and-colombias-energy-future', date:'Jun 23, 2026', mentions:['US'] },
      { title:'Between Patron and Strongman: Colombia\u2019s Security Crisis After Paz Total', url:'https://www.kantor-consulting.com/briefingroom/colombia-2026-between-patron-and-strongman-colombias-security-crisis-after-paz-total', date:'Jun 18, 2026', mentions:['US'] }
    ] },
    'Venezuela': { tier:'core', count:11, topics:['Post-Maduro order','Oil governance','Migration','External actors'], blurb:'A sustained focus: the contested transition, an oil-first order, mass migration, and the footholds of external competitors.', publications:[
      { title:'The Pottery Barn Rule Comes to Caracas', url:'https://www.kantor-consulting.com/briefingroom/the-pottery-barn-rule-comes-to-caracas-washingtons-venezuela-order-serves-the-oil-not-the-venezuelans', date:'Jul 8, 2026', mentions:['US','China'] }
    ] },
    'Mexico':    { tier:'focus', count:5, topics:['VNSA & cartels','US relations','Security'], blurb:'Regional violent non-state actor threats and the Mexico–US security relationship.' },
    'Brazil':    { tier:'focus', count:4, topics:['Regional power','China ties','Multipolar alignment'], blurb:'The hemisphere\u2019s pivotal power and a key node in external-actor competition.' },
    'Argentina': { tier:'emerging', count:3, topics:['Economy','Regional alignment'], blurb:'A growing area of coverage as its economic and geopolitical alignment shifts.' }
  };

  var REGIONS = {
    latam:    { label:'All of Latin America', count:'30+', names:LATAM, blurb:'Whole-basket analyses spanning Latin America — regional security, external-power competition, and hemispheric politics.' },
    andean:   { label:'Andean Region', count:'20+', names:['Colombia','Venezuela','Ecuador','Peru','Bolivia'], blurb:'Colombia and Venezuela anchor our deepest regional coverage, from armed groups to the shared frontier.' },
    camcarib: { label:'Central America & Caribbean', count:'8', names:['Mexico','Guatemala','Honduras','El Salvador','Nicaragua','Costa Rica','Panama','Cuba','Haiti','Dominican Rep.','Jamaica','Belize','Trinidad and Tobago'], blurb:'Regional violent non-state actor threats, migration corridors, and points of external-actor entry.' },
    southcone:{ label:'Southern Cone', count:'6', names:['Argentina','Brazil','Chile','Uruguay','Paraguay'], blurb:'Brazil and a rising Argentina lead a region increasingly contested by outside powers.' },
    northam:  { label:'North America', count:'9', names:['United States of America','Mexico','Canada'], blurb:'U.S. relations with the rest of the Western Hemisphere — the through-line of our North America work.' },
    europe:   { label:'Europe', count:'7', names:['France','Germany','Spain','Portugal','Italy','Netherlands','Belgium','Poland','Sweden','Finland','Austria','Ireland','Denmark','Czechia','Hungary','Romania','Greece','Bulgaria','Slovakia','Croatia','Lithuania','Latvia','Estonia','Slovenia','Luxembourg','Ukraine','United Kingdom','Norway','Switzerland','Serbia','Moldova','Belarus'], blurb:'Our Europe coverage centers on EU engagement with Latin America and the war in Ukraine.' },
    asiapac:  { label:'Asia Pacific', count:'5', names:['China','Japan','South Korea','India','Indonesia','Australia','Philippines','Vietnam','Thailand','Malaysia','New Zealand','Taiwan'], blurb:'The Indo-Pacific through the lens of strategic competition — above all China\u2019s expanding reach into the Western Hemisphere.' },
    mea:      { label:'Middle East & Africa', count:'4', names:['Iran','Saudi Arabia','Israel','Egypt','Turkey','Iraq','Syria','United Arab Emirates','Qatar','Nigeria','South Africa','Ethiopia','Kenya','Morocco','Algeria','Libya'], blurb:'Energy, security, and the reach of actors such as Iran — and where these dynamics intersect with the hemisphere.' }
  };

  var ACTORS = {
    US:     { name:'United States', kind:'us', srcName:'United States of America', coord:[-98,39], targets:['Colombia','Venezuela','Mexico','Brazil','Argentina','Panama'], blurb:'Our U.S. coverage centers on Washington\u2019s relations with the rest of the Western Hemisphere — security guarantees, immigration, and its shifting influence across Latin America.' },
    EU:     { name:'The EU & other European nations', kind:'partner', srcName:null, coord:[9,50], targets:['Colombia','Brazil','Argentina','Mexico','Chile'], blurb:'Our Europe coverage centers on EU engagement with Latin America — trade, values-based diplomacy, competition with other external powers — alongside other European nations, including the war in Ukraine.' },
    China:  { name:'China', kind:'competitor', srcName:'China', coord:[104,35], targets:['Venezuela','Brazil','Peru','Argentina','Ecuador'], blurb:'The principal strategic competitor across the hemisphere — infrastructure, resources, and deepening political ties.' },
    Russia: { name:'Russia', kind:'competitor', srcName:'Russia', coord:[92,62], targets:['Venezuela','Cuba','Nicaragua'], blurb:'Sustains footholds through partners like Venezuela, Cuba, and Nicaragua — arms, energy, and information operations.' },
    Iran:   { name:'Iran', kind:'competitor', srcName:'Iran', coord:[53,32], targets:['Venezuela'], blurb:'A narrower but real reach, anchored above all in its relationship with Caracas.' }
  };

  var COORD = { 'Colombia':[-73,4],'Venezuela':[-66,7],'Mexico':[-102,23],'Brazil':[-52,-10],'Argentina':[-64,-38],'Panama':[-80,9],'Chile':[-71,-35],'Peru':[-75,-10],'Ecuador':[-78,-1],'Cuba':[-79,22],'Nicaragua':[-85,13] };

  // Merge scraper output (publications.generated.js) if it loaded. Scraped data is
  // the source of truth and overrides the built-in examples above.
  if (window.KANTOR_PUBLICATIONS) {
    Object.keys(window.KANTOR_PUBLICATIONS).forEach(function (cn) {
      if (!COUNTRIES[cn]) COUNTRIES[cn] = { topics: [], blurb: 'Part of our regional coverage.' };
      COUNTRIES[cn].publications = window.KANTOR_PUBLICATIONS[cn];
      COUNTRIES[cn].count = window.KANTOR_PUBLICATIONS[cn].length;
    });
  }

  // Dashboard theme — competitors muted / de-saturated so they sit back.
  var T = { ocean:'#0c141d', land:'#212e3b', latamBase:'#2a4750', core:'#37b6ac', focus:'#2b8f8a', emerging:'#237572', partner:'#6486cd', partnerDim:'#33435f', competitor:'#7c554e', stroke:'#0c141d', thin:0.5, accent:'#37b6ac', grat:'#22303e', arcPartner:'#7fa0e0', arcComp:'#c68a80', marker:'#e8edf2' };

  var state = { sel:null, lens:null, basket:null };
  var feats = null, paths = null, proj = null, path = null, arcG = null, centroidCache = {};

  // Coordinate for arc endpoints: explicit COORD, else the country's geographic centroid.
  function coordFor(name) {
    if (COORD[name]) return COORD[name];
    if (centroidCache[name]) return centroidCache[name];
    if (feats) {
      var f = feats.find(function (d) { return d.properties.name === name; });
      if (f) { var c = d3.geoCentroid(f); centroidCache[name] = c; return c; }
    }
    return null;
  }

  function isInteractive(n) { return AMERICAS.indexOf(n) >= 0 || EU_MEMBERS.indexOf(n) >= 0 || EUROPE_OTHER.indexOf(n) >= 0 || COMPETITORS.indexOf(n) >= 0; }
  function actorKeyFor(n) {
    if (COMPETITORS.indexOf(n) >= 0) return n;
    if (n === 'United States of America') return 'US';
    if (EU_MEMBERS.indexOf(n) >= 0 || EUROPE_OTHER.indexOf(n) >= 0) return 'EU';
    return null;
  }
  // Derive an actor's connection targets from what our publications actually mention.
  // Add a publication tagged with this actor and a new line appears here automatically.
  function actorTargets(key) {
    var out = [];
    Object.keys(COUNTRIES).forEach(function (cn) {
      (COUNTRIES[cn].publications || []).forEach(function (p) {
        if (p.mentions && p.mentions.indexOf(key) >= 0 && out.indexOf(cn) < 0 && coordFor(cn)) out.push(cn);
      });
    });
    return out.length ? out : (ACTORS[key] ? ACTORS[key].targets : []);
  }
  function fillFor(n) {
    if (COMPETITORS.indexOf(n) >= 0) return T.competitor;
    if (n === 'United States of America') return T.partner;
    if (EU_MEMBERS.indexOf(n) >= 0 || EUROPE_OTHER.indexOf(n) >= 0) return T.partnerDim;
    var c = COUNTRIES[n];
    if (c) return c.tier === 'core' ? T.core : c.tier === 'focus' ? T.focus : T.emerging;
    if (LATAM.indexOf(n) >= 0) return T.latamBase;
    return T.land;
  }

  function drawMap() {
    var host = document.getElementById('so-map');
    host.innerHTML = '';
    var W = 1000, H = 620, pad = 14;
    var svg = d3.select(host).append('svg')
      .attr('viewBox', '0 0 ' + W + ' ' + H)
      .attr('width', '100%').attr('height', '100%')
      .attr('preserveAspectRatio', 'xMidYMid slice')
      .style('display', 'block');
    proj = d3.geoNaturalEarth1().rotate([72, -6]);
    proj.fitExtent([[pad, pad], [W - pad, H - pad]], { type: 'Sphere' });
    // Zoom in slightly and lift the frame north so Antarctica / Australia fall away.
    var s = proj.scale(), tr = proj.translate();
    proj.scale(s * 1.34).translate([tr[0] - 40, tr[1] + 40]);
    path = d3.geoPath(proj);

    svg.append('path').datum({ type: 'Sphere' }).attr('d', path).attr('fill', T.ocean);
    svg.append('path').datum(d3.geoGraticule10()).attr('d', path)
      .attr('fill', 'none').attr('stroke', T.grat).attr('stroke-width', 0.5).attr('opacity', 0.5);

    paths = svg.append('g').selectAll('path').data(feats).enter().append('path')
      .attr('d', path)
      .attr('fill', function (d) { return fillFor(d.properties.name); })
      .attr('stroke', T.stroke).attr('stroke-width', T.thin).attr('stroke-linejoin', 'round')
      .style('cursor', function (d) { return isInteractive(d.properties.name) ? 'pointer' : 'default'; });
    paths
      .on('click', function (ev, d) { if (isInteractive(d.properties.name)) selectCountry(d.properties.name); })
      .on('mouseenter', function (ev, d) { if (isInteractive(d.properties.name)) d3.select(this).attr('fill', d3.color(fillFor(d.properties.name)).brighter(0.6)); })
      .on('mouseleave', updateColors);
    arcG = svg.append('g').style('pointer-events', 'none');
    updateColors();
    drawArcs();
  }

  function updateColors() {
    if (!paths) return;
    var region = state.basket ? REGIONS[state.basket].names : null;
    var A = state.lens ? ACTORS[state.lens] : null;
    paths
      .attr('fill', function (d) { return fillFor(d.properties.name); })
      .attr('stroke', function (d) {
        var n = d.properties.name;
        if (n === state.sel) return T.accent;
        if (region && region.indexOf(n) >= 0) return T.accent;
        return T.stroke;
      })
      .attr('stroke-width', function (d) {
        var n = d.properties.name;
        if (n === state.sel) return 1.7;
        if (region && region.indexOf(n) >= 0) return 1.1;
        return T.thin;
      })
      .attr('opacity', function (d) {
        var n = d.properties.name;
        if (!A) return 1;
        if (A.targets.indexOf(n) >= 0) return 1;
        if (n === A.srcName) return 1;
        return 0.4;
      });
  }

  function drawArcs() {
    if (!arcG) return;
    arcG.selectAll('*').remove();
    if (!state.lens) return;
    var A = ACTORS[state.lens];
    var col = A.kind === 'competitor' ? T.arcComp : T.arcPartner;
    actorTargets(state.lens).forEach(function (name) {
      var tgt = coordFor(name); if (!tgt) return;
      var d = path({ type: 'LineString', coordinates: [A.coord, tgt] });
      if (d) arcG.append('path').attr('d', d).attr('fill', 'none').attr('stroke', col)
        .attr('stroke-width', 1.5).attr('stroke-linecap', 'round').attr('stroke-dasharray', '2 5').attr('opacity', 0.95);
      var p = proj(tgt);
      if (p) arcG.append('circle').attr('cx', p[0]).attr('cy', p[1]).attr('r', 3).attr('fill', col);
    });
    var ps = proj(A.coord);
    if (ps) arcG.append('circle').attr('cx', ps[0]).attr('cy', ps[1]).attr('r', 5)
      .attr('fill', T.marker).attr('stroke', col).attr('stroke-width', 2);
  }

  function selectCountry(name) {
    var key = actorKeyFor(name);
    if (key) { setActor(key); return; }
    state.sel = name; state.lens = null; state.basket = null;
    updateColors(); drawArcs(); syncLens(); render();
  }
  function setActor(key) {
    state.lens = key; state.sel = null; state.basket = null;
    updateColors(); drawArcs(); syncLens(); render();
  }
  function setBasket(r) {
    state.basket = r; state.sel = null; state.lens = null;
    updateColors(); drawArcs(); syncLens(); render();
  }
  function reset() {
    state.sel = null; state.lens = null; state.basket = null;
    updateColors(); drawArcs(); syncLens(); render();
  }
  function syncLens() {
    document.querySelectorAll('#so-lensrow .so-lensbtn').forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-actor') === state.lens);
    });
  }

  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function pubsHtml(list) {
    if (!list || !list.length) return '';
    var h = '<div class="so-label">Selected publications</div>';
    list.forEach(function (p) {
      h += '<a class="so-pub" href="' + p.url + '" target="_blank" rel="noopener"><span class="so-pub-t">' + esc(p.title) + '</span><span class="so-pub-d">' + esc(p.date) + '</span></a>';
    });
    return h + '<div style="height:16px;"></div>';
  }
  function chipsHtml(list) {
    if (!list || !list.length) return '';
    return list.map(function (t) { return '<span class="so-chip">' + esc(t) + '</span>'; }).join('');
  }

  function render() {
    var el = document.getElementById('so-panel');
    var h = '';
    if (state.sel) {
      var c = COUNTRIES[state.sel] || {};
      var tierLabel = c.tier ? ({ core:'CORE COVERAGE', focus:'FOCUS COUNTRY', emerging:'EMERGING FOCUS' })[c.tier] : 'LATAM COVERAGE';
      h += '<button class="so-back" data-act="back">← back</button>';
      h += '<div class="so-eyebrow" style="color:#37b6ac;">' + tierLabel + '</div>';
      h += '<div class="so-h2">' + esc(state.sel) + '</div>';
      if (c.count) h += '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:12px;color:#a9b4c0;margin-bottom:14px;">' + c.count + ' publications · illustrative</div>';
      h += '<p class="so-p">' + esc(c.blurb || 'Part of our regional Latin America coverage.') + '</p>';
      h += pubsHtml(c.publications);
      h += chipsHtml(c.topics);
      h += '<div style="margin-top:20px;"><a class="so-link" href="' + PORTFOLIO + '" target="_blank" rel="noopener">View publications on portfolio →</a></div>';
    } else if (state.lens) {
      var a = ACTORS[state.lens];
      var kindLabel = a.kind === 'competitor' ? 'STRATEGIC COMPETITOR' : a.kind === 'us' ? 'PARTNER · UNITED STATES' : 'PARTNER · ENGAGEMENT';
      var col = a.kind === 'competitor' ? '#c68a80' : '#37b6ac';
      h += '<button class="so-back" data-act="back">← back</button>';
      h += '<div class="so-eyebrow" style="color:' + col + ';">' + kindLabel + '</div>';
      h += '<div class="so-h2">' + esc(a.name) + '</div>';
      h += '<p class="so-p">' + esc(a.blurb) + '</p>';
      h += '<div class="so-label">Where our publications connect them</div>';
      h += chipsHtml(actorTargets(state.lens));
      h += '<div style="margin-top:20px;"><a class="so-link" href="' + PORTFOLIO + '" target="_blank" rel="noopener">View related analysis →</a></div>';
    } else if (state.basket) {
      var r = REGIONS[state.basket];
      h += '<button class="so-back" data-act="back">← back</button>';
      h += '<div class="so-eyebrow" style="color:#37b6ac;">REGIONAL BASKET</div>';
      h += '<div class="so-h2">' + esc(r.label) + '</div>';
      h += '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:12px;color:#a9b4c0;margin-bottom:14px;">' + r.count + ' publications · illustrative</div>';
      h += '<p class="so-p">' + esc(r.blurb) + '</p>';
      h += pubsHtml(r.publications);
      h += '<div style="margin-top:6px;"><a class="so-link" href="' + PORTFOLIO + '" target="_blank" rel="noopener">View basket on portfolio →</a></div>';
    } else {
      h += '<div class="so-eyebrow" style="color:#37b6ac;">Overview</div>';
      h += '<div class="so-h2">The Hemisphere at a glance</div>';
      h += '<p class="so-p">Select any highlighted country for our published analysis, or open a whole-basket view below.</p>';
      h += '<div class="so-label">Regional baskets</div>';
      h += '<button class="so-basket lead" data-region="latam">All of Latin America</button>';
      h += '<button class="so-basket" data-region="andean">Andean region</button>';
      h += '<button class="so-basket" data-region="camcarib">Central America &amp; Caribbean</button>';
      h += '<button class="so-basket" data-region="southcone">Southern Cone</button>';
      h += '<button class="so-basket" data-region="northam">North America</button>';
      h += '<div class="so-label" style="margin-top:16px;">Global regions</div>';
      h += '<button class="so-basket" data-region="europe">Europe</button>';
      h += '<button class="so-basket" data-region="asiapac">Asia Pacific</button>';
      h += '<button class="so-basket" data-region="mea">Middle East &amp; Africa</button>';
      h += '<p class="so-note">Publication counts are illustrative pending live data.</p>';
    }
    el.innerHTML = h;
  }

  // Event delegation for panel + lens buttons
  document.getElementById('so-panel').addEventListener('click', function (ev) {
    var b = ev.target.closest('button'); if (!b) return;
    if (b.getAttribute('data-act') === 'back') reset();
    else if (b.getAttribute('data-region')) setBasket(b.getAttribute('data-region'));
  });
  document.getElementById('so-lensrow').addEventListener('click', function (ev) {
    var b = ev.target.closest('.so-lensbtn'); if (!b) return;
    var a = b.getAttribute('data-actor');
    if (state.lens === a) reset(); else setActor(a);
  });

  render();

  function boot() {
    if (!(window.d3 && window.topojson)) { setTimeout(boot, 120); return; }
    d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(function (topo) {
      feats = topojson.feature(topo, topo.objects.countries).features;
      drawMap();
    }).catch(function (e) { console.error('map data load failed', e); });
  }
  boot();
})();
</script>
</body>
</html>
